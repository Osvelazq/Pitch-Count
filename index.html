<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; touch-action: manipulation; }
        .stats { font-size: 32px; margin: 20px 0; font-weight: bold; }
        .button-container { display: flex; flex-direction: column; gap: 15px; }
        button { 
            padding: 30px; 
            font-size: 24px; 
            border: none; 
            border-radius: 10px; 
            color: white; 
        }
        #strikeBtn { background-color: #d9534f; } 
        #ballBtn { background-color: #5cb85c; }   
        #resetBtn { background-color: #333; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <h3>Pitch Tracker</h3>
    <div class="stats">S: <span id="s">0</span> | B: <span id="b">0</span></div>
    
    <div class="button-container">
        <button id="strikeBtn" onclick="add('s')">STRIKE</button>
        <button id="ballBtn" onclick="add('b')">BALL</button>
    </div>

    <p>Strikeouts: <span id="so">0</span> | Walks: <span id="bb">0</span></p>
    <button id="resetBtn" onclick="reset()">Reset Stats</button>

    <script>
        // Initialize from local storage or default to 0
        let s = parseInt(localStorage.getItem('s')) || 0;
        let b = parseInt(localStorage.getItem('b')) || 0;
        let so = parseInt(localStorage.getItem('so')) || 0;
        let bb = parseInt(localStorage.getItem('bb')) || 0;

        function update() {
            document.getElementById('s').innerText = s;
            document.getElementById('b').innerText = b;
            document.getElementById('so').innerText = so;
            document.getElementById('bb').innerText = bb;
            
            // Save to local storage
            localStorage.setItem('s', s);
            localStorage.setItem('b', b);
            localStorage.setItem('so', so);
            localStorage.setItem('bb', bb);
        }
        
        // Initial call to populate UI
        update();

        function add(type) {
            if(type === 's') { 
                s++; 
                if(s === 3) { so++; s = 0; b = 0; } 
            } else { 
                b++; 
                if(b === 4) { bb++; s = 0; b = 0; } 
            }
            update();
        }
        
        function reset() { 
            if(confirm("Reset all stats?")) {
                s = 0; b = 0; so = 0; bb = 0; 
                update(); 
            }
        }
    </script>
</body>
</html>
